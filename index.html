<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HIGHER AD | 로그인</title>
  <link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy:#0f172a; --accent:#10b981; --accent2:#059669; --muted:#94a3b8;
      --border:#e2e8f0; --text:#1e293b; --text2:#64748b; --bg:#f8fafc;
    }
    body { font-family:'Pretendard',sans-serif; background:var(--bg); min-height:100vh; display:flex; align-items:center; justify-content:center; position:relative; overflow:hidden; }
    .bg-deco { position:fixed; inset:0; pointer-events:none; z-index:0; }
    .bg-deco::before { content:''; position:absolute; top:-200px; right:-200px; width:600px; height:600px; background:radial-gradient(circle, rgba(16,185,129,.07) 0%, transparent 70%); border-radius:50%; }
    .bg-deco::after  { content:''; position:absolute; bottom:-150px; left:-150px; width:500px; height:500px; background:radial-gradient(circle, rgba(15,23,42,.05) 0%, transparent 70%); border-radius:50%; }
    .login-wrap { position:relative; z-index:1; width:420px; animation:slideUp .5s cubic-bezier(.22,.68,0,1.2) both; }
    @keyframes slideUp { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }
    .login-header { text-align:center; margin-bottom:32px; }
    .login-logo { display:inline-flex; align-items:center; gap:8px; font-size:26px; font-weight:900; letter-spacing:-1px; color:var(--navy); }
    .login-logo span { color:var(--accent); }
    .login-logo-dot { width:8px; height:8px; border-radius:50%; background:var(--accent); animation:pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.4);opacity:.6} }
    .login-sub { font-size:13px; color:var(--text2); margin-top:8px; letter-spacing:.3px; }
    .tab-bar { display:flex; background:#f1f5f9; border-radius:10px; padding:4px; margin-bottom:24px; }
    .tab-btn { flex:1; padding:9px; border:none; border-radius:7px; font-size:13px; font-weight:600; cursor:pointer; font-family:inherit; background:transparent; color:var(--text2); transition:.2s; }
    .tab-btn.active { background:#fff; color:var(--text); box-shadow:0 1px 4px rgba(0,0,0,.08); }
    .login-card { background:#fff; border:1px solid var(--border); border-radius:20px; padding:32px 40px 40px; box-shadow:0 4px 40px rgba(0,0,0,.06); }
    .field-group { margin-bottom:16px; }
    .field-label { display:block; font-size:12px; font-weight:700; color:var(--text2); margin-bottom:7px; letter-spacing:.3px; text-transform:uppercase; }
    .field-input { width:100%; padding:13px 16px; border:1.5px solid var(--border); border-radius:10px; font-size:14px; font-family:inherit; color:var(--text); background:#fff; outline:none; transition:border-color .2s, box-shadow .2s; }
    .field-input::placeholder { color:var(--muted); }
    .field-input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(16,185,129,.1); }
    .field-input.error { border-color:#ef4444; }
    .error-msg { display:none; font-size:12px; color:#ef4444; margin-top:8px; padding:10px 14px; background:rgba(239,68,68,.06); border-radius:8px; border-left:3px solid #ef4444; }
    .error-msg.show { display:block; }
    .success-msg { display:none; font-size:12px; color:#059669; margin-top:8px; padding:10px 14px; background:rgba(16,185,129,.06); border-radius:8px; border-left:3px solid var(--accent); }
    .success-msg.show { display:block; }
    .login-btn { width:100%; padding:14px; background:var(--accent); color:#fff; border:none; border-radius:10px; cursor:pointer; font-size:15px; font-weight:700; font-family:inherit; transition:background .2s, transform .1s, box-shadow .2s; margin-top:8px; box-shadow:0 4px 16px rgba(16,185,129,.25); }
    .login-btn:hover { background:var(--accent2); box-shadow:0 6px 20px rgba(16,185,129,.35); }
    .login-btn:active { transform:scale(.98); }
    .login-btn:disabled { background:var(--muted); box-shadow:none; cursor:not-allowed; }
    .spinner { display:inline-block; width:16px; height:16px; border:2px solid rgba(255,255,255,.4); border-top-color:#fff; border-radius:50%; animation:spin .6s linear infinite; margin-right:8px; vertical-align:middle; }
    @keyframes spin { to{transform:rotate(360deg)} }
    .field-hint { font-size:11px; color:var(--muted); margin-top:4px; }
    .tab-content { display:none; }
    .tab-content.active { display:block; }

    /* ── 반응형 ── */
    @media (max-width: 480px) {
      .login-wrap { width: 100%; padding: 0 16px; }
      .login-card { padding: 24px 20px 32px; border-radius: 16px; }
      .login-logo { font-size: 22px; }
      .login-sub { font-size: 12px; }
      .login-header { margin-bottom: 24px; }
      .field-input { padding: 11px 14px; font-size: 13px; }
      .login-btn { padding: 13px; font-size: 14px; }
    }
  </style>
</head>
<body>

<div class="bg-deco"></div>

<div class="login-wrap">
  <div class="login-header">
    <div class="login-logo">
      HIGHER <span>AD</span>
      <div class="login-logo-dot"></div>
    </div>
    <p class="login-sub">슬롯 접수 및 현황 관리 포털</p>
  </div>

  <div class="login-card">
    <div class="tab-bar">
      <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">로그인</button>
      <button class="tab-btn" id="tab-signup" onclick="switchTab('signup')">회원가입</button>
    </div>

    <!-- 로그인 탭 -->
    <div class="tab-content active" id="content-login">
      <div class="field-group">
        <label class="field-label">아이디</label>
        <input class="field-input" id="inp-id" type="text" placeholder="아이디를 입력하세요" autocomplete="username">
      </div>
      <div class="field-group">
        <label class="field-label">비밀번호</label>
        <input class="field-input" id="inp-pw" type="password" placeholder="비밀번호를 입력하세요" autocomplete="current-password">
      </div>
      <div class="error-msg" id="login-error"></div>
      <button class="login-btn" id="login-btn" onclick="doLogin()">로그인</button>
    </div>

    <!-- 회원가입 탭 -->
    <div class="tab-content" id="content-signup">
      <div class="field-group">
        <label class="field-label">아이디 *</label>
        <input class="field-input" id="su-id" type="text" placeholder="영문/숫자 4자 이상">
        <div class="field-hint">로그인에 사용할 아이디를 입력하세요.</div>
      </div>
      <div class="field-group">
        <label class="field-label">비밀번호 *</label>
        <input class="field-input" id="su-pw" type="password" placeholder="6자 이상 입력">
      </div>
      <div class="field-group">
        <label class="field-label">비밀번호 확인 *</label>
        <input class="field-input" id="su-pw2" type="password" placeholder="비밀번호를 다시 입력하세요">
      </div>
      <div class="field-group">
        <label class="field-label">업체명 *</label>
        <input class="field-input" id="su-agency" type="text" placeholder="업체명을 입력하세요">
      </div>
      <div class="error-msg" id="signup-error"></div>
      <div class="success-msg" id="signup-success"></div>
      <button class="login-btn" id="signup-btn" onclick="doSignup()">회원가입</button>
    </div>
  </div>
</div>

<script type="module">
  import HA from './ha-store.js';

  // 이미 로그인된 경우 바로 이동 (member 역할만)
  const cur = HA.getCurrentUser();
  if (cur && cur.role === 'member') location.href = 'user-dashboard.html';

  window.switchTab = function(tab) {
    ['login','signup'].forEach(t => {
      document.getElementById('content-'+t).classList.toggle('active', t===tab);
      document.getElementById('tab-'+t).classList.toggle('active', t===tab);
    });
  };

  document.getElementById('inp-pw').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  document.getElementById('inp-id').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('inp-pw').focus(); });
  document.getElementById('su-pw2').addEventListener('keydown', e => { if (e.key === 'Enter') doSignup(); });

  ['inp-id','inp-pw'].forEach(id => {
    document.getElementById(id).addEventListener('input', () => {
      document.getElementById('login-error').classList.remove('show');
      document.getElementById(id).classList.remove('error');
    });
  });

  window.doLogin = async function() {
    const username = document.getElementById('inp-id').value.trim();
    const password = document.getElementById('inp-pw').value;
    const btn = document.getElementById('login-btn');

    if (!username || !password) {
      document.getElementById('login-error').textContent = '아이디와 비밀번호를 모두 입력해주세요.';
      document.getElementById('login-error').classList.add('show');
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>로그인 중...';

    const result = await HA.login(username, password);
    if (result.ok) {
      location.href = 'user-dashboard.html';
    } else {
      const msg = result.reason === 'pending'
        ? '관리자 승인 대기 중입니다. 승인 후 로그인 가능합니다.'
        : '아이디 또는 비밀번호가 올바르지 않습니다.';
      document.getElementById('login-error').textContent = msg;
      document.getElementById('login-error').classList.add('show');
      ['inp-id','inp-pw'].forEach(id => document.getElementById(id).classList.add('error'));
      btn.disabled = false;
      btn.textContent = '로그인';
    }
  };

  window.doSignup = async function() {
    const username  = document.getElementById('su-id').value.trim();
    const password  = document.getElementById('su-pw').value;
    const password2 = document.getElementById('su-pw2').value;
    const agency    = document.getElementById('su-agency').value.trim();
    const errEl     = document.getElementById('signup-error');
    const sucEl     = document.getElementById('signup-success');
    const btn       = document.getElementById('signup-btn');

    errEl.classList.remove('show');
    sucEl.classList.remove('show');

    if (!username || !password) { errEl.textContent = '아이디와 비밀번호를 입력해주세요.'; errEl.classList.add('show'); return; }
    if (username.length < 4)    { errEl.textContent = '아이디는 4자 이상 입력해주세요.';    errEl.classList.add('show'); return; }
    if (password.length < 6)    { errEl.textContent = '비밀번호는 6자 이상 입력해주세요.';  errEl.classList.add('show'); return; }
    if (password !== password2)  { errEl.textContent = '비밀번호가 일치하지 않습니다.';       errEl.classList.add('show'); return; }
    if (!agency)                 { errEl.textContent = '업체명을 입력해주세요.';              errEl.classList.add('show'); return; }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>처리 중...';

    try {
      const users  = await HA.getUsers();
      const exists = users.find(u => u.username === username);
      if (exists) {
        errEl.textContent = '이미 사용 중인 아이디입니다.';
        errEl.classList.add('show');
        btn.disabled = false;
        btn.textContent = '회원가입';
        return;
      }

      await HA.addUser({ username, password, agency, unitPrice: 0 });

      sucEl.textContent = '회원가입이 완료되었습니다! 관리자 승인 후 로그인 가능합니다.';
      sucEl.classList.add('show');
      btn.disabled = false;
      btn.textContent = '회원가입';

      setTimeout(() => {
        document.getElementById('su-id').value = '';
        document.getElementById('su-pw').value = '';
        document.getElementById('su-pw2').value = '';
        document.getElementById('su-agency').value = '';
        sucEl.classList.remove('show');
        switchTab('login');
      }, 2500);

    } catch (err) {
      errEl.textContent = '오류가 발생했습니다. 다시 시도해주세요.';
      errEl.classList.add('show');
      btn.disabled = false;
      btn.textContent = '회원가입';
    }
  };
</script>
</body>
</html>
