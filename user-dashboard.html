<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HIGHER AD | 내 현황</title>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.427.0/dist/umd/lucide.min.js"></script>
  <link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:   #0f172a;
      --accent: #10b981;
      --accent2:#059669;
      --muted:  #94a3b8;
      --border: #e2e8f0;
      --text:   #1e293b;
      --text2:  #64748b;
      --bg:     #f0f4f8;
      --card:   #ffffff;
      --danger: #ef4444;
      --warn:   #f59e0b;
      --info:   #3b82f6;
    }

    body {
      font-family: 'Pretendard', sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh;
    }

    /* ── 상단 헤더 ── */
    header {
      background: var(--navy);
      padding: 0 36px;
      height: 60px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .header-logo {
      font-size: 18px; font-weight: 900; letter-spacing: -0.5px; color: #fff; cursor: pointer;
    }
    .header-logo span { color: var(--accent); }
    .header-right { display: flex; align-items: center; gap: 16px; }
    .header-user {
      display: flex; align-items: center; gap: 8px;
      font-size: 13px; color: var(--muted);
    }
    .header-user strong { color: #fff; }
    .header-avatar {
      width: 30px; height: 30px; border-radius: 50%;
      background: var(--accent); display: flex; align-items: center;
      justify-content: center; font-size: 12px; font-weight: 700; color: #fff;
    }
    .header-nav { display: flex; gap: 4px; }
    .nav-tab {
      padding: 7px 16px; border-radius: 7px; cursor: pointer;
      font-size: 13px; font-weight: 500; color: var(--muted);
      transition: .2s;
    }
    .nav-tab:hover { color: #fff; background: rgba(255,255,255,.08); }
    .nav-tab.active { color: #fff; background: var(--accent); }
    .btn-logout {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 12px; border-radius: 7px; cursor: pointer;
      font-size: 12px; color: var(--muted); border: 1px solid rgba(255,255,255,.1);
      transition: .2s;
    }
    .btn-logout:hover { color: #fff; border-color: rgba(255,255,255,.3); }

    /* ── 메인 컨텐츠 ── */
    main { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }

    /* ── 탭 컨텐츠 ── */
    .tab-content { display: none; }
    .tab-content.active { display: block; animation: fadeIn .3s ease-out; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

    /* ── 웰컴 배너 ── */
    .welcome-banner {
      background: var(--navy);
      border-radius: 16px;
      padding: 28px 32px;
      margin-bottom: 24px;
      display: flex; align-items: center; justify-content: space-between;
      position: relative; overflow: hidden;
    }
    .welcome-banner::after {
      content: '';
      position: absolute; right: -40px; top: -40px;
      width: 200px; height: 200px;
      background: radial-gradient(circle, rgba(16,185,129,.15) 0%, transparent 70%);
      border-radius: 50%;
    }
    .welcome-text h2 { font-size: 20px; font-weight: 800; color: #fff; margin-bottom: 4px; }
    .welcome-text p  { font-size: 13px; color: var(--muted); }
    .btn-apply-main {
      background: var(--accent); color: #fff; border: none;
      padding: 13px 28px; border-radius: 10px; cursor: pointer;
      font-size: 14px; font-weight: 700; font-family: inherit;
      display: flex; align-items: center; gap: 8px;
      transition: .2s; white-space: nowrap; position: relative; z-index: 1;
      box-shadow: 0 4px 16px rgba(16,185,129,.3);
    }
    .btn-apply-main:hover { background: var(--accent2); transform: translateY(-1px); }

    /* ── 통계 카드 ── */
    .stat-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 24px;
    }
    .stat-card {
      background: var(--card); border: 1px solid var(--border); border-radius: 14px;
      padding: 20px; position: relative; overflow: hidden;
    }
    .stat-card::after {
      content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 3px;
    }
    .stat-card.c-green::after { background: var(--accent); }
    .stat-card.c-warn::after  { background: var(--warn); }
    .stat-card.c-info::after  { background: var(--info); }
    .stat-card.c-danger::after{ background: var(--danger); }
    .stat-icon {
      width: 36px; height: 36px; border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 14px;
    }
    .stat-icon.green  { background: rgba(16,185,129,.1);  color: var(--accent); }
    .stat-icon.warn   { background: rgba(245,158,11,.1);  color: var(--warn); }
    .stat-icon.info   { background: rgba(59,130,246,.1);  color: var(--info); }
    .stat-icon.danger { background: rgba(239,68,68,.1);   color: var(--danger); }
    .stat-label { font-size: 11px; color: var(--text2); font-weight: 600; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
    .stat-value { font-size: 28px; font-weight: 800; color: var(--text); line-height: 1; }
    .stat-unit  { font-size: 13px; color: var(--muted); margin-left: 2px; }

    /* ── 섹션 ── */
    .section-header {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px;
    }
    .section-title { font-size: 16px; font-weight: 700; }
    .section-more {
      font-size: 12px; color: var(--accent); cursor: pointer;
      background: none; border: none; font-weight: 600;
    }

    /* ── 캠페인 테이블 ── */
    .table-wrap {
      background: var(--card); border: 1px solid var(--border); border-radius: 12px;
      overflow-x: auto; margin-bottom: 24px;
    }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead th {
      background: var(--navy); color: #fff; padding: 12px 14px;
      font-weight: 500; text-align: center; white-space: nowrap;
      border-right: 1px solid #2d3f55;
    }
    tbody td {
      padding: 12px 14px; border-bottom: 1px solid var(--border);
      text-align: center; vertical-align: middle;
    }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover { background: #f8fafc; }

    .status-badge { display: inline-block; font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 10px; }
    .s-pending  { background: rgba(245,158,11,.1); color: #b45309; }
    .s-active   { background: rgba(16,185,129,.1);  color: #059669; }
    .s-rejected { background: rgba(239,68,68,.1);   color: #dc2626; }
    .s-expired  { background: #f1f5f9; color: var(--text2); }
    .s-terminated { background: rgba(100,116,139,.12); color: #334155; }

    .rank-badge { color: var(--info); border: 1px solid var(--info); padding: 2px 8px; border-radius: 4px; font-weight: 700; font-size: 11px; }
    .dday-badge { font-size: 11px; font-weight: 700; padding: 2px 7px; border-radius: 4px; }
    .dday-urgent{ background: #fef2f2; color: var(--danger); }
    .dday-soon  { background: #fefce8; color: #a16207; }
    .dday-ok    { background: #f0fdf4; color: #15803d; }

    .empty-state {
      text-align: center; padding: 60px 20px;
      color: var(--text2); font-size: 13px;
    }
    .empty-state p { margin-top: 8px; }

    /* ── 공지사항 ── */
    .notice-list { background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
    .notice-item {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 20px; border-bottom: 1px solid var(--border); cursor: pointer;
      transition: .15s;
    }
    .notice-item:last-child { border-bottom: none; }
    .notice-item:hover { background: #f8fafc; }
    .pin-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--danger); flex-shrink: 0; }
    .normal-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border); flex-shrink: 0; }
    .notice-title { flex: 1; font-size: 13px; font-weight: 500; color: var(--text); }
    .notice-meta { font-size: 11px; color: var(--muted); white-space: nowrap; }

    /* ── 공지 상세 모달 ── */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 9000; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .modal-box { background: #fff; border-radius: 16px; width: 560px; max-height: 80vh; overflow-y: auto; padding: 28px; box-shadow: 0 20px 60px rgba(0,0,0,.2); }
    .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
    .modal-meta  { font-size: 12px; color: var(--muted); margin-bottom: 20px; }
    .modal-body  { font-size: 14px; line-height: 1.8; color: var(--text); white-space: pre-wrap; }
    .modal-footer{ display: flex; justify-content: flex-end; margin-top: 24px; }
    .btn-close { padding: 9px 24px; border: 1px solid var(--border); border-radius: 8px; background: #fff; cursor: pointer; font-size: 13px; }

    /* ── 필터 ── */
    .filter-row {
      display: flex; gap: 8px; align-items: center; margin-bottom: 12px; flex-wrap: wrap;
    }
    .filter-row select, .filter-row input {
      padding: 7px 12px; border: 1px solid var(--border); border-radius: 7px;
      font-size: 12px; font-family: inherit; background: var(--card); color: var(--text); outline: none;
    }
    .btn-search {
      padding: 7px 16px; background: var(--navy); color: #fff; border: none;
      border-radius: 7px; font-size: 12px; cursor: pointer; font-family: inherit;
    }
    .btn-apply-sm {
      padding: 7px 16px; background: var(--accent); color: #fff; border: none;
      border-radius: 7px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit;
      display: flex; align-items: center; gap: 5px; margin-left: auto;
    }
    .btn-apply-sm:hover { background: var(--accent2); }

    /* ── 정산 ── */
    .settle-summary { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-bottom:20px; }
    .settle-card { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:20px; position:relative; overflow:hidden; }
    .settle-card::after { content:''; position:absolute; bottom:0; left:0; right:0; height:3px; background:var(--accent); }
    .settle-card.warn::after { background:var(--warn); }
    .settle-card.info::after { background:var(--info); }
    .settle-card.purple::after { background:#8b5cf6; }
    .settle-card.navy::after { background:#3b82f6; }
    .settle-label { font-size:11px; color:var(--text2); font-weight:600; text-transform:uppercase; letter-spacing:.5px; margin-bottom:8px; }
    .settle-value { font-size:22px; font-weight:800; color:var(--text); line-height:1; }
    .settle-unit  { font-size:12px; color:var(--muted); margin-left:2px; }
    .settle-tbl-wrap { background:var(--card); border:1px solid var(--border); border-radius:12px; overflow-x:auto; }
    .settle-tbl-wrap table { width:100%; border-collapse:collapse; font-size:13px; min-width:700px; }
    .paid-badge   { background:rgba(16,185,129,.1); color:#059669; padding:2px 8px; border-radius:10px; font-size:11px; font-weight:700; }
    .unpaid-badge { background:rgba(239,68,68,.1); color:var(--danger); padding:2px 8px; border-radius:10px; font-size:11px; font-weight:700; }

    /* ── 정산 접수 시간 그룹 ── */
    .settle-time-group { margin-bottom:20px; }
    .settle-time-header {
      display:flex; align-items:center; gap:10px;
      background:var(--navy); color:#fff;
      padding:10px 16px; border-radius:10px 10px 0 0;
      font-size:13px; font-weight:700;
    }
    .settle-time-badge {
      background:var(--accent); color:#fff;
      padding:2px 8px; border-radius:6px; font-size:11px; font-weight:600;
    }
    .settle-time-amount {
      margin-left:auto; font-size:13px; font-weight:700; color:var(--accent);
    }

    /* ── 반응형 ── */
    @media (max-width:768px) {
      /* 헤더 */
      header { padding: 0 16px; height: 56px; }
      .header-nav { gap: 2px; }
      .nav-tab { padding: 6px 10px; font-size: 12px; }
      .header-user span { display: none; }
      .btn-logout span { display: none; }

      /* 메인 */
      main { padding: 16px; }

      /* 웰컴 배너 */
      .welcome-banner { padding: 20px; flex-direction: column; align-items: flex-start; gap: 14px; }
      .btn-apply-main { width: 100%; justify-content: center; }

      /* 통계 카드 — 2열 */
      .stat-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .stat-value { font-size: 22px; }

      /* 테이블 — 가로 스크롤 */
      .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
      .table-wrap table { min-width: 600px; }

      /* 필터 */
      .filter-row { flex-wrap: wrap; gap: 6px; }
      .btn-apply-sm { margin-left: 0; }

      /* 정산 요약 카드 — 2열 */
      .settle-summary { grid-template-columns: repeat(2,1fr); }
    }

    /* ── 프로필 모달 ── */
    .profile-overlay { position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9100;display:flex;align-items:center;justify-content:center;padding:20px; }
    .profile-box { background:#fff;border-radius:18px;width:420px;padding:32px;box-shadow:0 24px 64px rgba(0,0,0,.2);animation:slideUp .25s ease-out; }
    @keyframes slideUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
    .profile-header { display:flex;align-items:center;gap:14px;margin-bottom:24px; }
    .profile-avatar-lg { width:52px;height:52px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:#fff;flex-shrink:0; }
    .profile-header-info h3 { font-size:16px;font-weight:800;color:var(--text); }
    .profile-header-info p  { font-size:12px;color:var(--text2);margin-top:2px; }
    .profile-divider { border:none;border-top:1px solid var(--border);margin:0 0 20px; }
    .profile-field { margin-bottom:16px; }
    .profile-field label { display:block;font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px; }
    .profile-field input { width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:9px;font-size:13px;font-family:inherit;outline:none;color:var(--text);transition:.2s; }
    .profile-field input:focus { border-color:var(--accent);box-shadow:0 0 0 3px rgba(16,185,129,.1); }
    .profile-field input[readonly] { background:#f8fafc;color:var(--text2);cursor:default; }
    .profile-hint { font-size:11px;color:var(--muted);margin-top:5px; }
    .profile-footer { display:flex;justify-content:flex-end;gap:10px;margin-top:24px; }
    .profile-btn-cancel { padding:10px 22px;border:1.5px solid var(--border);border-radius:9px;background:#fff;cursor:pointer;font-size:13px;font-family:inherit;color:var(--text2); }
    .profile-btn-save { padding:10px 22px;border:none;border-radius:9px;background:var(--accent);color:#fff;cursor:pointer;font-size:13px;font-weight:700;font-family:inherit;box-shadow:0 4px 12px rgba(16,185,129,.25); }
    .profile-btn-save:disabled { background:var(--muted);box-shadow:none;cursor:not-allowed; }
    .profile-msg { font-size:12px;padding:10px 14px;border-radius:8px;margin-top:12px;display:none; }
    .profile-msg.success { background:rgba(16,185,129,.08);color:#059669;border-left:3px solid var(--accent);display:block; }
    .profile-msg.error   { background:rgba(239,68,68,.06);color:var(--danger);border-left:3px solid var(--danger);display:block; }
  </style>
</head>
<body>

<header>
  <div class="header-logo" onclick="switchTab('home')">HIGHER <span>AD</span></div>
  <div class="header-nav">
    <div class="nav-tab active" id="tab-home" onclick="switchTab('home')">대시보드</div>
    <div class="nav-tab" id="tab-slots" onclick="switchTab('slots')">내 캠페인</div>
    <div class="nav-tab" id="tab-settle" onclick="switchTab('settle')">정산</div>
    <div class="nav-tab" id="tab-notices" onclick="switchTab('notices')">공지사항</div>
  </div>
  <div class="header-right">
    <div class="header-user" id="header-user-btn" onclick="openProfileModal()" title="내 정보 변경"
      style="cursor:pointer;padding:5px 8px;border-radius:8px;transition:.2s;"
      onmouseover="this.style.background='rgba(255,255,255,.08)'"
      onmouseout="this.style.background='transparent'">
      <div class="header-avatar" id="user-avatar">?</div>
      <span><strong id="user-name">-</strong> 님</span>
      <i data-lucide="chevron-down" size="12" style="color:var(--muted);margin-left:2px"></i>
    </div>
    <div class="btn-logout" onclick="doLogout()">
      <i data-lucide="log-out" size="13"></i> 로그아웃
    </div>
  </div>
</header>

<main>
  <!-- ── 홈 탭 ── -->
  <div class="tab-content active" id="content-home">
    <div class="welcome-banner">
      <div class="welcome-text">
        <h2 id="welcome-msg">안녕하세요 👋</h2>
        <p>현재 운영 중인 캠페인 현황을 확인하고 새 캠페인을 신청하세요.</p>
      </div>
      <button class="btn-apply-main" onclick="location.href='user-apply.html'">
        <i data-lucide="plus-circle" size="16"></i>
        새 캠페인 신청하기
      </button>
    </div>

    <div class="stat-grid" id="home-stats"></div>

    <div class="section-header">
      <span class="section-title">최근 캠페인 현황</span>
      <button class="section-more" onclick="switchTab('slots')">전체보기</button>
    </div>
    <div class="table-wrap" id="home-recent-table"></div>

    <div class="section-header" style="margin-top:28px;">
      <span class="section-title">공지사항</span>
      <button class="section-more" onclick="switchTab('notices')">전체보기</button>
    </div>
    <div class="notice-list" id="home-notices"></div>
  </div>

  <!-- ── 내 캠페인 탭 ── -->
  <div class="tab-content" id="content-slots">
    <div class="section-header">
      <span class="section-title">내 캠페인 관리</span>
    </div>
    <!-- 요약바 -->
    <div id="my-slots-summary" style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 20px;display:flex;gap:32px;align-items:center;margin-bottom:12px;flex-wrap:wrap;">
      <div class="loading-wrap" style="height:auto"><div class="spinner"></div></div>
    </div>
    <div class="filter-row">
      <select id="f-status" onchange="renderMySlots()">
        <option value="">전체 상태</option>
        <option value="active">진행중</option>
        <option value="pending">승인대기</option>
        <option value="rejected">반려</option>
        <option value="expired">만료</option>
        <option value="terminated">종료</option>
      </select>
      <select id="f-range" onchange="renderMySlots()">
        <option value="all" selected>전체 진행중</option>
        <option value="3">3일 이내</option>
        <option value="7">7일 이내</option>
        <option value="14">14일 이내</option>
      </select>
      <input type="text" id="f-kw" placeholder="플레이스명/MID/키워드 검색">
      <button class="btn-search" onclick="renderMySlots()">검색</button>
      <button class="btn-apply-sm" onclick="location.href='user-apply.html'">
        <i data-lucide="plus" size="13"></i> 캠페인 신청
      </button>
    </div>
    <div class="table-wrap" id="slots-table"></div>
  </div>

  <!-- ── 정산 탭 ── -->
  <div class="tab-content" id="content-settle">
    <div class="notice-list" id="settle-list"></div>
  </div>

  <!-- ── 공지사항 탭 ── -->
  <div class="tab-content" id="content-notices">
    <div class="section-header">
      <span class="section-title">공지사항</span>
    </div>
    <div class="notice-list" id="all-notices"></div>
  </div>
</main>

<script type="module">
  import HA from './ha-store.js';

  // URL에서 파일명 숨기기 — 항상 / 로만 표시
  history.replaceState(null, '', '/');

  // ── 인증 확인 ────────────────────────────────────────────────
  const user = HA.getCurrentUser();
  if (!user || user.role === 'admin') location.href = 'index.html';

  // ── 유저 정보 세팅 ───────────────────────────────────────────
  const displayName = user.agency || user.agencyId || user.username;
  document.getElementById('user-name').textContent = displayName;
  document.getElementById('user-avatar').textContent = displayName.charAt(0).toUpperCase();
  document.getElementById('welcome-msg').textContent = `안녕하세요, ${displayName} 님 👋`;

  // ── 탭 전환 ─────────────────────────────────────────────────
  window.switchTab = function switchTab(tab) {
    ['home','slots','notices','settle'].forEach(t => {
      document.getElementById('content-'+t).classList.toggle('active', t===tab);
      document.getElementById('tab-'+t).classList.toggle('active', t===tab);
    });
    if (tab==='home')    renderHome();
    if (tab==='slots')   renderMySlots();
    if (tab==='notices') renderAllNotices();
    if (tab==='settle')  renderSettle();
    window.scrollTo(0,0);
  }

  // ── D-Day 계산 ───────────────────────────────────────────────
  function getDday(endDate) {
    const today = new Date(); today.setHours(0,0,0,0);
    const end   = new Date(endDate); end.setHours(0,0,0,0);
    return Math.ceil((end - today) / 86400000);
  }
  function ddayBadge(d) {
    if (d <= 3)  return `<span class="dday-badge dday-urgent">D-${d}</span>`;
    if (d <= 7)  return `<span class="dday-badge dday-soon">D-${d}</span>`;
    return `<span class="dday-badge dday-ok">D-${d}</span>`;
  }

  // ── 상태 배지 ────────────────────────────────────────────────
  const statusBadge = {
    pending:    '<span class="status-badge s-pending">승인대기</span>',
    active:     '<span class="status-badge s-active">진행중</span>',
    rejected:   '<span class="status-badge s-rejected">반려</span>',
    expired:    '<span class="status-badge s-expired">만료</span>',
    terminated: '<span class="status-badge s-terminated">종료</span>',
  };

  // ── 내 캠페인 가져오기 ─────────────────────────────────────────
  // ── 홈 렌더 ─────────────────────────────────────────────────
  async function renderHome() {
    const [allSlots, allNotices] = await Promise.all([
      HA.getSlots(),
      HA.getNotices(),
    ]);

    const mySlots = allSlots.filter(s => s.userId === user.username);

    const pending = mySlots.filter(s => s.status === 'pending');
    const today   = new Date(); today.setHours(0,0,0,0);
    const in3     = new Date(today); in3.setDate(today.getDate()+3);
    const expiring= active.filter(s => { const d=new Date(s.endDate); return d<=in3 && d>=today; });

    document.getElementById('home-stats').innerHTML = `
      <div class="stat-card c-green">
        <div class="stat-icon green"><i data-lucide="layers" size="18"></i></div>
        <div class="stat-label">진행중 캠페인</div>
        <div class="stat-value">${active.length}<span class="stat-unit">개</span></div>
      </div>
      <div class="stat-card c-info">
        <div class="stat-icon info"><i data-lucide="trending-up" size="18"></i></div>
        <div class="stat-label">진행중 전체 목표</div>
        <div class="stat-value">${active.reduce((a,s)=>a+(s.dailyTarget||0)*(s.days||0),0).toLocaleString()}<span class="stat-unit">개</span></div>
      </div>
      <div class="stat-card c-warn">
        <div class="stat-icon warn"><i data-lucide="timer" size="18"></i></div>
        <div class="stat-label">만료 예정(3일)</div>
        <div class="stat-value">${expiring.length}<span class="stat-unit">건</span></div>
      </div>
      <div class="stat-card c-danger">
        <div class="stat-icon danger"><i data-lucide="inbox" size="18"></i></div>
        <div class="stat-label">승인 대기</div>
        <div class="stat-value">${pending.length}<span class="stat-unit">건</span></div>
      </div>`;

    // 최근 캠페인 5개
    const recent = mySlots.slice(0, 5);
    const tbl = document.getElementById('home-recent-table');
    if (!recent.length) {
      tbl.innerHTML = `<div class="empty-state">
        <i data-lucide="inbox" size="40" style="color:var(--muted)"></i>
        <p>신청한 캠페인이 없습니다.<br>새 캠페인 신청 버튼을 눌러 시작하세요.</p>
      </div>`;
    } else {
      tbl.innerHTML = `<table>
        <thead><tr>
          <th>플레이스명</th><th>순위키워드</th>
          <th>기간</th><th>일 목표</th><th>D-Day</th><th>상태</th>
        </tr></thead>
        <tbody>${recent.map(s => `<tr>
          <td style="font-weight:500">${s.storeName||'-'}</td>
          <td style="color:var(--text2)">${s.rankKeyword||'-'}</td>
          <td style="color:var(--text2);font-size:12px">${s.startDate} ~ ${s.endDate}</td>
          <td><strong>${(s.dailyTarget||0).toLocaleString()}</strong></td>
          <td>${s.status==='active' ? ddayBadge(getDday(s.endDate)) : '-'}</td>
          <td>${statusBadge[s.status]||s.status}</td>

  // ── 내 캠페인 전체 렌더 ───────────────────────────────────────
  window.renderMySlots = async function() {
    const status = document.getElementById('f-status').value;
    const range  = document.getElementById('f-range').value;
    const kw     = (document.getElementById('f-kw').value||'').toLowerCase();
    const todayDt = new Date(); todayDt.setHours(0,0,0,0);

    const allSlots = await HA.getSlots();
    let mySlots = allSlots.filter(s => s.userId === user.username);

    // 일자 필터 (active 캠페인에만 적용)
    let slots = mySlots.filter(s => {
      if (status && s.status !== status) return false;
      if (kw && ![(s.storeName||''),(s.rankKeyword||''),(s.mid||'')].some(v=>v.toLowerCase().includes(kw))) return false;
      // 일자 필터: active 캠페인 + 오늘 이후 종료일만
      if (range !== 'all') {
        if (s.status !== 'active') return false;
        const d = new Date(s.endDate); d.setHours(0,0,0,0);
        if (d < todayDt) return false;
        const limit = new Date(todayDt);
        limit.setDate(todayDt.getDate() + Number(range));
        limit.setHours(23,59,59,999);
        if (d > limit) return false;
      }
      return true;
    });

    // D-Day 순 정렬: active → endDate 오름차순, 나머지(만료/반려 등)는 뒤로
    slots.sort((a, b) => {
      const aActive = a.status === 'active';
      const bActive = b.status === 'active';
      if (aActive && !bActive) return -1;
      if (!aActive && bActive) return 1;
      if (aActive && bActive) return new Date(a.endDate) - new Date(b.endDate);
      return new Date(b.createdAt||0) - new Date(a.createdAt||0);
    });

    // 요약바 (내 캠페인 기준, active만)
    const activeSlots = mySlots.filter(s => {
      const d = new Date(s.endDate); d.setHours(0,0,0,0);
      return s.status === 'active' && d >= todayDt;
    });
    const t3  = activeSlots.filter(s => { const d=getDday(s.endDate); return d<=3; }).length;
    const t7  = activeSlots.filter(s => { const d=getDday(s.endDate); return d>=4 && d<=7; }).length;
    const t14 = activeSlots.filter(s => { const d=getDday(s.endDate); return d>=8 && d<=14; }).length;
    const sumEl = document.getElementById('my-slots-summary');
    let summaryItems = `<div style="font-size:11px;color:var(--text2);margin-bottom:2px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;min-width:60px">진행중<br><span style="font-size:18px;font-weight:800;color:var(--accent)">${activeSlots.length}<small style="font-size:11px;color:var(--muted);font-weight:400"> 개</small></span></div>`;
    if(range==='3'||range==='7'||range==='14'||range==='all') summaryItems += `<div style="font-size:11px;color:var(--text2);margin-bottom:2px;font-weight:600">3일 이내<br><span style="font-size:18px;font-weight:800;color:var(--danger)">${t3}<small style="font-size:11px;color:var(--muted);font-weight:400"> 건</small></span></div>`;
    if(range==='7'||range==='14'||range==='all') summaryItems += `<div style="font-size:11px;color:var(--text2);margin-bottom:2px;font-weight:600">7일 이내<br><span style="font-size:18px;font-weight:800;color:var(--warn)">${t7}<small style="font-size:11px;color:var(--muted);font-weight:400"> 건</small></span></div>`;
    if(range==='14'||range==='all') summaryItems += `<div style="font-size:11px;color:var(--text2);margin-bottom:2px;font-weight:600">14일 이내<br><span style="font-size:18px;font-weight:800;color:var(--info)">${t14}<small style="font-size:11px;color:var(--muted);font-weight:400"> 건</small></span></div>`;
    sumEl.innerHTML = summaryItems;

    const tbl = document.getElementById('slots-table');
    if (!slots.length) {
      tbl.innerHTML = `<div class="empty-state">
        <i data-lucide="search-x" size="40" style="color:var(--muted)"></i>
        <p>조건에 맞는 캠페인이 없습니다.</p>
      </div>`;
      lucide.createIcons(); return;
    }

    tbl.innerHTML = `<table>
      <thead><tr>
        <th>플레이스명</th><th>MID</th><th>순위키워드</th>
        <th>일 수</th><th>시작일</th><th>종료일</th><th>일 목표</th><th>D-Day</th><th>상태</th>
      </tr></thead>
      <tbody>${slots.map(s => `<tr>
        <td style="font-weight:500">${s.url ? `<a href="${s.url}" target="_blank" style="color:var(--text);text-decoration:none;font-weight:600;" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--text)'">${s.storeName||'-'}</a>` : (s.storeName||'-')}</td>
        <td style="color:var(--text2);font-size:11px">${s.mid||'-'}</td>
        <td style="color:var(--text2)">${s.rankKeyword||'-'}</td>
        <td style="color:var(--text2)">${s.days||'-'}</td>
        <td style="color:var(--text2)">${s.startDate||'-'}</td>
        <td style="color:var(--text2)">${s.endDate||'-'}</td>
        <td><strong>${(s.dailyTarget||0).toLocaleString()}</strong></td>
        <td>${s.status==='active' ? ddayBadge(getDday(s.endDate)) : '-'}</td>
        <td>${statusBadge[s.status]||s.status}
          ${s.status==='rejected' && s.rejectReason ? `<br><small style="color:var(--danger);font-size:10px">${s.rejectReason}</small>` : ''}
        </td>
      </tr>`).join('')}
      </tbody></table>`;
    lucide.createIcons();
  }

  // ── 공지사항 렌더 ────────────────────────────────────────────
  async function renderAllNotices() {
    const notices = await HA.getNotices();
    document.getElementById('all-notices').innerHTML = notices.map(n => `
      <div class="notice-item" onclick="openNotice(${n.id})">
        ${n.pinned ? '<div class="pin-dot"></div>' : '<div class="normal-dot"></div>'}
        <span class="notice-title">${n.title}</span>
        <span class="notice-meta">${n.date.slice(0,10)} · 조회 ${n.views}</span>
      </div>`).join('');
  }

  function openNotice(id) {
    const n = HA.getNotices().find(x=>x.id===id);
    if (!n) return;
    HA.updateNotice(id, { views: n.views+1 });
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.innerHTML = `
      <div class="modal-box">
        <div class="modal-title">${n.title}</div>
        <div class="modal-meta">${n.author} · ${n.date}</div>
        <div class="modal-body">${n.content||'내용이 없습니다.'}</div>
        <div class="modal-footer">
          <button class="btn-close" onclick="this.closest('.modal-overlay').remove()">닫기</button>
        </div>
      </div>`;
    document.body.appendChild(overlay);
  }

  // ── 정산 렌더 ─────────────────────────────────────────────
  window.renderSettle = async function() {
    const settleList = document.getElementById('settle-list');
    if (!settleList) return;
    settleList.innerHTML = '<div style="padding:40px;text-align:center;color:var(--muted)">불러오는 중...</div>';

    const now      = new Date();
    const todayStr = now.toISOString().slice(0,10);

    // 당월 (예: 3월)
    const curMonth = now.getMonth() + 1; // 1~12
    const curYear  = now.getFullYear();
    const monthLabel = `${curMonth}월`;

    const [allSlots, allUsers, paidSet, refundMap] = await Promise.all([
      HA.getSlots(),
      HA.getUsers(),
      HA.getPaidSet(),
      HA.getRefunds().catch(() => ({})),
    ]);

    const myUser    = allUsers.find(u => u.username === user.username);
    const unitPrice = myUser ? (myUser.unitPrice || 0) : 0;

    const mySlots = allSlots.filter(s =>
      s.userId === user.username && (s.status === 'active' || s.status === 'expired' || s.status === 'pending' || s.status === 'terminated' || s.status === 'rejected')
    );

    // 슬롯 저장 단가 우선, 없으면 현재 유저 단가 (기존 데이터 호환)
    function getSlotPrice(s) {
      return (s.unitPrice != null && s.unitPrice !== '' && s.unitPrice > 0) ? s.unitPrice : unitPrice;
    }

    function getSlotAmount(s) {
      return (s.dailyTarget||0) * (s.days||0) * getSlotPrice(s);
    }
    function getSlotTarget(s) {
      return (s.dailyTarget||0) * (s.days||0);
    }

    // 그룹 환불 조회 (정산관리와 동일한 refundKey 구조)
    function safe(str) { return (str||'').replace(/[.#$[\]]/g, '_'); }
    function getGroupRefund(timeKey, agencyId, userId) {
      const key = `${safe(timeKey)}__${safe(agencyId)}__${safe(userId)}`;
      return (refundMap || {})[key] || 0;
    }

    // ── 금액 계산 ──────────────────────────────────────────────
    // 전체 환불 합계 (유저 본인 관련 키만)
    const totalRefund = Object.entries(refundMap || {}).reduce((a, [k, v]) => {
      return a + (v || 0);
    }, 0);

    const totalAmount  = mySlots.reduce((a,s) => a + getSlotAmount(s), 0) - totalRefund;
    const paidAmount   = mySlots.filter(s => paidSet.has(s._key)).reduce((a,s) => a + getSlotAmount(s), 0) - totalRefund;
    const unpaidAmount = mySlots.filter(s => !paidSet.has(s._key)).reduce((a,s) => a + getSlotAmount(s), 0);

    // 당월 정산 금액(VAT 별도) (접수일 기준 당월)
    const monthSlots = mySlots.filter(s => {
      const d = (s.createdAt||'').slice(0,10);
      if (!d) return false;
      const dt = new Date(d);
      return dt.getFullYear() === curYear && (dt.getMonth()+1) === curMonth;
    });
    const monthAmount = monthSlots.reduce((a,s) => a + getSlotAmount(s), 0);

    // 일 정산 금액(VAT 별도) (오늘 접수된 건만)
    const todaySlots = mySlots.filter(s => (s.createdAt||'').slice(0,10) === todayStr);
    const todayAmount = todaySlots.reduce((a,s) => a + getSlotAmount(s), 0);

    // ── 접수 시간 단위로 그룹핑 ────────────────────────────────
    // createdAt (ISO string)을 분 단위로 그룹 (HH:MM 기준)
    // 그룹 key = createdAt의 "YYYY-MM-DDTHH:MM" (초 제외)
    function formatTime(isoStr) {
      if (!isoStr) return '-';
      const d = new Date(isoStr);
      const hh = String(d.getHours()).padStart(2,'0');
      const mm = String(d.getMinutes()).padStart(2,'0');
      const ss = String(d.getSeconds()).padStart(2,'0');
      return `${hh}:${mm}:${ss}`;
    }
    function getDateLabel(isoStr) {
      if (!isoStr) return '-';
      return isoStr.slice(0,10);
    }
    function getGroupKey(isoStr) {
      // 접수 날짜 + 시:분 을 기준으로 그룹핑
      if (!isoStr) return 'unknown';
      const d = new Date(isoStr);
      const yyyy = d.getFullYear();
      const mo   = String(d.getMonth()+1).padStart(2,'0');
      const dd   = String(d.getDate()).padStart(2,'0');
      const hh   = String(d.getHours()).padStart(2,'0');
      const mn   = String(d.getMinutes()).padStart(2,'0');
      return `${yyyy}-${mo}-${dd} ${hh}:${mn}`;
    }

    // 그룹 맵 생성: key → { label, slots[] }
    const groupMap = new Map();
    // 최신 순 정렬 (createdAt 내림차순)
    const sortedSlots = [...mySlots].sort((a,b) => {
      const da = a.createdAt || '';
      const db = b.createdAt || '';
      return db.localeCompare(da);
    });
    sortedSlots.forEach(s => {
      const key = getGroupKey(s.createdAt);
      if (!groupMap.has(key)) groupMap.set(key, { key, slots: [] });
      groupMap.get(key).slots.push(s);
    });

    // 그룹별 HTML 생성
    const thStyle = `background:var(--navy);color:#fff;padding:10px 12px;font-weight:500;text-align:center;white-space:nowrap;font-size:12px;border-right:1px solid #2d3f55`;
    const tdStyle = (extra='') => `padding:10px 12px;border-bottom:1px solid var(--border);text-align:center;${extra}`;

    const rowsHtml = [...groupMap.entries()].map(([key, group]) => {
      const groupTotal  = group.slots.reduce((a,s) => a + getSlotTarget(s), 0);
      const groupAmount = group.slots.reduce((a,s) => a + getSlotAmount(s), 0);
      const groupKey    = group.key; // "YYYY-MM-DD HH:MM"
      const agencyId    = group.slots[0]?.agencyId || '-';
      const userId2     = group.slots[0]?.userId   || '-';
      const refund      = getGroupRefund(groupKey, agencyId, userId2);
      const netAmount   = groupAmount - refund;
      const allPaid = group.slots.every(s => paidSet.has(s._key));
      const anyPaid = group.slots.some(s => paidSet.has(s._key));
      const paidLabel = allPaid
        ? '<span class="paid-badge">정산완료</span>'
        : anyPaid
          ? '<span class="unpaid-badge">일부정산</span>'
          : '<span class="unpaid-badge">미정산</span>';
      const firstSlot = group.slots[0];
      const timeStr = formatTime(firstSlot.createdAt).slice(0,5); // HH:MM
      const dateStr = getDateLabel(firstSlot.createdAt);
      const refundHtml = refund > 0
        ? `<br><span style="color:var(--danger);font-size:11px;font-weight:600">- ${refund.toLocaleString()}원</span>`
        : '';
      return `<tr>
        <td style="${tdStyle('font-size:12px;color:var(--text2);font-weight:600')}">
          ${dateStr}<br><span style="color:var(--accent);font-size:13px;font-weight:700">${timeStr}</span>
        </td>
        <td style="${tdStyle('font-weight:600')}">${Math.round(groupTotal).toLocaleString()}<small style="color:var(--muted);font-weight:400"> 개</small></td>
        <td style="${tdStyle('color:var(--text2)')}">${getSlotPrice(firstSlot).toLocaleString()}<small style="color:var(--muted)"> 원</small></td>
        <td style="${tdStyle('font-weight:700;color:var(--accent)')}">${Math.round(netAmount).toLocaleString()}<small style="color:var(--muted);font-weight:400"> 원</small>${refundHtml}</td>
        <td style="${tdStyle('font-weight:700;color:#8b5cf6')}">${Math.round(netAmount * 1.1).toLocaleString()}<small style="color:var(--muted);font-weight:400"> 원</small></td>
        <td style="${tdStyle()}">${paidLabel}</td>
      </tr>`;
    }).join('');

    const groupsHtml = rowsHtml ? `
      <div class="settle-tbl-wrap" style="border-radius:10px">
        <table>
          <thead><tr>
            <th style="${thStyle}">접수 시간</th>
            <th style="${thStyle}">전체 목표</th>
            <th style="${thStyle}">단가</th>
            <th style="${thStyle}">정산 금액(VAT 별도)</th>
            <th style="${thStyle}">입금액(VAT 포함)</th>
            <th style="${thStyle}">정산 상태</th>
          </tr></thead>
          <tbody>${rowsHtml}</tbody>
        </table>
      </div>` : '';

    settleList.innerHTML = `
      <div style="padding:20px 20px 0">
        <div class="settle-summary">
          <div class="settle-card purple">
            <div class="settle-label">${monthLabel} 정산 금액(VAT 포함)</div>
            <div class="settle-value" style="color:#8b5cf6">${Math.round(monthAmount * 1.1).toLocaleString()}<span class="settle-unit">원</span></div>
            <div style="font-size:11px;color:var(--text2);margin-top:6px">${monthSlots.length}건</div>
          </div>
          <div class="settle-card navy">
            <div class="settle-label">일 정산 금액(VAT 포함)</div>
            <div class="settle-value" style="color:var(--info)">${Math.round(todayAmount * 1.1).toLocaleString()}<span class="settle-unit">원</span></div>
            <div style="font-size:11px;color:var(--text2);margin-top:6px">${todaySlots.length}건</div>
          </div>
          <div class="settle-card warn">
            <div class="settle-label">미정산 금액(VAT 포함)</div>
            <div class="settle-value" style="color:var(--warn)">${Math.round(unpaidAmount * 1.1).toLocaleString()}<span class="settle-unit">원</span></div>
            <div style="font-size:11px;color:var(--text2);margin-top:6px">${mySlots.filter(s => !paidSet.has(s._key)).length}건</div>
          </div>
        </div>
      </div>
      <div style="padding:0 20px 20px">
        ${groupsHtml || `<div style="padding:60px;text-align:center;color:var(--muted)">정산 데이터가 없습니다.</div>`}
      </div>`;

    lucide.createIcons();
  };

  // ── 프로필 정보 변경 모달 ────────────────────────────────────
  window.openProfileModal = function() {
    const displayName = user.agency || user.agencyId || user.username;
    const overlay = document.createElement('div');
    overlay.className = 'profile-overlay';
    overlay.innerHTML = `
      <div class="profile-box">
        <div class="profile-header">
          <div class="profile-avatar-lg" id="pm-avatar">${displayName.charAt(0).toUpperCase()}</div>
          <div class="profile-header-info">
            <h3 id="pm-display">${displayName}</h3>
            <p>${user.username}</p>
          </div>
        </div>
        <hr class="profile-divider">
        <div class="profile-field">
          <label>아이디</label>
          <input value="${user.username}" readonly>
        </div>
        <div class="profile-field">
          <label>업체명 (대행사)</label>
          <input id="pm-agency" value="${user.agency || user.agencyId || ''}" placeholder="업체명을 입력하세요">
        </div>
        <div class="profile-field">
          <label>새 비밀번호</label>
          <input id="pm-pw" type="password" placeholder="변경할 비밀번호 입력 (변경 없으면 비워두세요)">
          <div class="profile-hint">6자 이상 입력 시 변경됩니다</div>
        </div>
        <div class="profile-field">
          <label>비밀번호 확인</label>
          <input id="pm-pw2" type="password" placeholder="비밀번호를 다시 입력하세요">
        </div>
        <div id="pm-msg" class="profile-msg"></div>
        <div class="profile-footer">
          <button class="profile-btn-cancel" onclick="this.closest('.profile-overlay').remove()">취소</button>
          <button class="profile-btn-save" id="pm-save-btn" onclick="saveProfile()">저장</button>
        </div>
      </div>`;
    document.body.appendChild(overlay);
    overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
    lucide.createIcons();
  };

  window.saveProfile = async function() {
    const agency  = document.getElementById('pm-agency').value.trim();
    const pw      = document.getElementById('pm-pw').value;
    const pw2     = document.getElementById('pm-pw2').value;
    const msgEl   = document.getElementById('pm-msg');
    const saveBtn = document.getElementById('pm-save-btn');

    msgEl.className = 'profile-msg';
    msgEl.textContent = '';

    if (pw && pw.length < 6) {
      msgEl.textContent = '비밀번호는 6자 이상 입력해주세요.';
      msgEl.className = 'profile-msg error'; return;
    }
    if (pw && pw !== pw2) {
      msgEl.textContent = '비밀번호가 일치하지 않습니다.';
      msgEl.className = 'profile-msg error'; return;
    }

    saveBtn.disabled = true;
    saveBtn.textContent = '저장 중...';

    try {
      const patch = { agency, agencyId: agency };
      if (pw) patch.password = pw;

      await HA.updateUser(user._key, patch);

      // 세션 갱신
      const updated = { ...user, agency, agencyId: agency };
      if (pw) updated.password = pw;
      sessionStorage.setItem('ha_current_user', JSON.stringify(updated));

      // 헤더 즉시 반영
      const newDisplay = agency || user.username;
      document.getElementById('user-name').textContent = newDisplay;
      document.getElementById('user-avatar').textContent = newDisplay.charAt(0).toUpperCase();
      document.getElementById('pm-display').textContent = newDisplay;
      document.getElementById('pm-avatar').textContent = newDisplay.charAt(0).toUpperCase();

      msgEl.textContent = '✓ 저장되었습니다.';
      msgEl.className = 'profile-msg success';
      saveBtn.disabled = false;
      saveBtn.textContent = '저장';
      document.getElementById('pm-pw').value = '';
      document.getElementById('pm-pw2').value = '';
    } catch(e) {
      msgEl.textContent = '저장 중 오류가 발생했습니다.';
      msgEl.className = 'profile-msg error';
      saveBtn.disabled = false;
      saveBtn.textContent = '저장';
    }
  };

  window.doLogout = function() {
    HA.logout();
    location.href = 'index.html';
  }

  // ── 초기 렌더 ────────────────────────────────────────────────
  renderHome();
  lucide.createIcons();
</script>
</body>
</html>
